<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

    <div class="container">
        <h2 class="text-center mb-3">Heat Index Checker</h2>

        <details class="mb-3">
            <summary>Note</summary>
            <p>
                Please input the temperature and the humidity. After accomplishing this, press proceed.
            </p>
        </details>

        <div class="mb-3">
            <label class="form-label">Degree in Celsius</label>
            <input type="number" class="form-control" id="DC" placeholder="Enter temperature">
        </div>

        <div class="mb-3">
            <label class="form-label">Humidity</label>
            <input type="number" class="form-control" id="H" placeholder="Enter humidity">
        </div>

        <div class="d-grid mb-3">
            <button class="btn btn-info" onclick="calculate()">Proceed</button>
        </div>

        <p id="result" class="fw-bold"></p>
    </div>

    <script>
        function calculate() {
            let temperature = parseFloat(document.getElementById("DC").value);
            let humidity = parseFloat(document.getElementById("H").value);

            let heatIndex = temperature + (0.33 * humidity) - 4;

            let status = "";

            if (temperature <= 27) {
                status = "Comfortable";
            } else if (temperature <= 32) {
                status = "Warm";
            } else if (temperature <= 37) {
                status = "Hot";
            } else if (temperature <= 41) {
                status = "Very Hot";
            } else {
                status = "Extreme Heat";
            }

            document.getElementById("result").innerHTML =
                "Temperature: " + temperature + " °C | Heat Index: " + heatIndex.toFixed(2) + " - " + status;
        }
    </script>

</body>
</html>
