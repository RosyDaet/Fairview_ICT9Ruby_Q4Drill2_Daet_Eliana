<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <!-- Bootstrap should be inside head -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <blockquote>
        <h1>Heat Index Checker</h1>

    </blockquote>


    <script>
        // Function to calculate heat index
        function calculate() {

            // Get values from input
            let temperature = document.getElementById("temp").value;
            let humidity = document.getElementById("hum").value;

            // Compute heat index
            let heatIndex = temperature + (0.33 * humidity) - 4;

            let status = "";

            // Conditions
            if (heatIndex <= 27) {
                status = "Comfortable";
            } else if (heatIndex <= 32) {
                status = "Warm";
            } else if (heatIndex <= 37) {
                status = "Hot";
            } else if (heatIndex <= 41) {
                status = "Very Hot";
            } else {
                status = "Extreme Heat";
            }

            // Display result
            document.getElementById("result").innerHTML =
                "Heat Index: " + heatIndex + " °C - " + status;
        }
    </script>

</body>
</html>
